[tool.ruff]
target-version = "py310"
line-length = 100
src = ["api", "webKinPred", "db_models", "tests", "tools"]
exclude = [
    "models",
    "frontend",
    "media",
    "fastas",
    "staticfiles",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
fixable = ["ALL"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
docstring-code-format = true
docstring-code-line-length = "dynamic"

[tool.mypy]
python_version = "3.10"
plugins = ["mypy_django_plugin.main"]
files = ["api", "webKinPred", "db_models", "manage.py"]
exclude = "(?x)(^models/|^frontend/|^media/|^fastas/|^staticfiles/|^tests/|^tools/|^api/migrations/)"
explicit_package_bases = true
namespace_packages = true
check_untyped_defs = true
no_implicit_optional = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unused_configs = true
show_error_codes = true
pretty = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["requests"]
ignore_missing_imports = true

[tool.django-stubs]
django_settings_module = "webKinPred.settings"

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests", "tools/seqmap"]
norecursedirs = [
    "models",
    "frontend",
    "media",
    "fastas",
    "staticfiles",
    ".git",
    ".pytest_cache",
    "node_modules",
]
python_files = ["test_*.py", "*_test.py"]
