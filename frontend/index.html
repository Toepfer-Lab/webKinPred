<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Kinetic Predictor</title>

    <!-- Basic metadata -->
    <meta
      name="description"
      content="Kinetic Predictor predicts enzyme kinetic parameters (kcat, Km) for enzyme–substrate pairs using machine-learning models."
    />
    <meta name="theme-color" content="#000000" />

    <!-- Open Graph -->
    <meta property="og:title" content="Kinetic Predictor" />
    <meta
      property="og:description"
      content="Predict enzyme kinetic parameters (kcat, Km) for enzyme–substrate pairs using machine-learning models."
    />
    <meta property="og:url" content="https://predictor.openkinetics.org" />
    <meta property="og:type" content="website" />

    <!-- Icons (served from /public). Keep only what you actually have. -->
    <link rel="icon" href="/favicon.ico" />
    <!-- If you have these, uncomment:
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    -->

    <!-- Umami Analytics is injected lazily from src/index.jsx to keep it off the critical path. -->
    <!-- Prevent flash of wrong theme by applying saved theme before first paint -->
    <script>
      (function () {
        var t = localStorage.getItem('wkp-theme');
        document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Vite entrypoint -->
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
